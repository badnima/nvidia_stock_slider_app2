<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NVIDIA Stock Slider</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header class="page-header">
    <div class="header-inner">
      <div>
        <p class="eyebrow">End-of-Day Market View</p>
        <h1>52-Week Stock Position</h1>
        <p class="updated-at" id="updated-at">Loading latest market close data...</p>
        <p class="rate-limit-note">Due to API rate limiting of the free stock quote service</p>
        <p class="credits-used" id="credits-used">Loading API credit usage...</p>
      </div>
      <button class="refresh-button" id="refresh-button" type="button">Refresh</button>
    </div>
  </header>

  <main class="page-shell">
    <section class="table-shell" aria-label="Stock slider table">
      <table>
        <thead>
          <tr>
            <th>Company</th>
            <th>52-Week Position</th>
          </tr>
        </thead>
        <tbody id="rows">
          <tr class="message-row">
            <td colspan="2">Loading latest market close data...</td>
          </tr>
        </tbody>
      </table>
    </section>
  </main>

  <script src="/app.js"></script>
</body>
</html>
